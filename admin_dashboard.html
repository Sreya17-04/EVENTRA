<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

<div class="navbar">
    <h2>EVENTRA</h2>
    <div class="nav-right">
        <span>admin@college.edu</span>
        <span class="role-badge">ADMIN</span>
        <span class="logout" onclick="logout()">Logout</span>
    </div>
</div>

<div class="dashboard-layout">

    <div class="main-content">

        <!-- ANALYTICS -->
        <div class="card">
            <h3>Booking Analytics</h3>
            <div style="display:flex; gap:20px; flex-wrap:wrap;">

                <div class="analytics-box">
                    <h4>Total</h4>
                    <p id="totalCount">0</p>
                </div>

                <div class="analytics-box">
                    <h4>Final Approved</h4>
                    <p id="approvedCount">0</p>
                </div>

                <div class="analytics-box">
                    <h4>Waiting Admin</h4>
                    <p id="pendingCount">0</p>
                </div>

                <div class="analytics-box">
                    <h4>Rejected</h4>
                    <p id="rejectedCount">0</p>
                </div>

            </div>
        </div>

        <!-- FINAL APPROVAL TABLE -->
        <div class="card">
            <h3>Coordinator Approved Requests</h3>

            <table class="table"></table>
        </div>

        <!-- APPROVAL HISTORY -->
        <div class="card">
            <h3>Recent Approval History</h3>
            <div id="approvalHistory"></div>
        </div>

    </div>

    <!-- CALENDAR -->
    <div class="calendar-sidebar">
        <div class="calendar-card">
            <h3>Campus Event Overview</h3>

            <div class="calendar-header">
                <button onclick="changeMonth(-1)">◀</button>
                <span id="monthYear"></span>
                <button onclick="changeMonth(1)">▶</button>
            </div>

            <div class="calendar-grid" id="calendar"></div>

            <p class="calendar-note">
                🟢 Final Approved &nbsp; 🟡 Waiting &nbsp; 🔴 Rejected
            </p>
        </div>
    </div>

</div>

<script>

let currentDate = new Date();
let bookings = [];

const BASE_URL = "http://127.0.0.1:5000";

/* AUTH */
if (!localStorage.getItem("token")) {
    location.href = "login.html";
}

function getAuthHeader() {
    return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + localStorage.getItem("token")
    };
}

function handle(res) {
    if (res.status === 401) {
        alert("Session expired");
        localStorage.clear();
        location.href = "login.html";
        return null;
    }
    return res.json();
}

/* ================= LOAD EVENTS ================= */
function loadEvents() {
    fetch(`${BASE_URL}/get_events`, {
        headers: getAuthHeader()
    })
    .then(handle)
    .then(data => {

        console.log("Admin Events:", data);

        if (!data || !Array.isArray(data)) return;

        bookings = data;
        calculateAnalytics();
        renderAdminTable();
        renderCalendar();
    })
    .catch(err => console.error("Load Events Error:", err));
}

/* ================= ANALYTICS ================= */
function calculateAnalytics() {
    document.getElementById("totalCount").innerText = bookings.length;

    document.getElementById("approvedCount").innerText =
        bookings.filter(b => b.status === "final_approved").length;

    document.getElementById("pendingCount").innerText =
        bookings.filter(b => b.status === "coord_approved").length;

    document.getElementById("rejectedCount").innerText =
        bookings.filter(b => b.status === "rejected").length;
}

/* ================= TABLE ================= */
function renderAdminTable() {

    const table = document.querySelector(".table");

    table.innerHTML = `
    <tr>
        <th>STUDENT</th>
        <th>EVENT</th>
        <th>HALL</th>
        <th>DATE</th>
        <th>ACTION</th>
    </tr>`;

    const pending = bookings.filter(e => e.status === "coord_approved");

    pending.forEach(e => {
        table.innerHTML += `
        <tr>
            <td>${e.student?.username || "-"}</td>
            <td>${e.title}</td>
            <td>${e.hall?.name || "-"}</td>
            <td>${e.date}</td>
            <td>
                <button class="btn" onclick="finalApprove(${e.id})">Approve</button>
                <button class="btn reject-btn" onclick="reject(${e.id})">Reject</button>
            </td>
        </tr>`;
    });
}

/* ================= STATUS ================= */
function finalApprove(id) {
    updateStatus(id, "final_approved");
}

function reject(id) {
    updateStatus(id, "rejected");
}

function updateStatus(id, status) {

    const remarks = prompt("Remarks (optional):") || "";

    fetch(`${BASE_URL}/approve_event/${id}`, {
        method: "POST",
        headers: getAuthHeader(),
        body: JSON.stringify({
            decision: status,
            remarks: remarks
        })
    })
    .then(handle)
    .then(() => {
        loadEvents();
        loadApprovalHistory();
    })
    .catch(err => console.error("Update Error:", err));
}

/* ================= HISTORY ================= */
function loadApprovalHistory() {

    fetch(`${BASE_URL}/get_approval_history`, {
        headers: getAuthHeader()
    })
    .then(handle)
    .then(data => {

        console.log("History:", data);

        const div = document.getElementById("approvalHistory");
        div.innerHTML = "";

        if (!data || data.length === 0) {
            div.innerHTML = "<p>No history</p>";
            return;
        }

        data.forEach(h => {
            div.innerHTML += `
            <div class="history-item">
                <b>${h.event_title}</b> - ${h.decision} by ${h.approver}
                <br>${h.decision_time}
                ${h.remarks ? `<br><i>${h.remarks}</i>` : ""}
            </div>`;
        });
    })
    .catch(err => console.error("History Error:", err));
}

/* ================= CALENDAR ================= */
function renderCalendar() {

    const calendar = document.getElementById("calendar");
    const monthYear = document.getElementById("monthYear");

    calendar.innerHTML = "";

    const m = currentDate.getMonth();
    const y = currentDate.getFullYear();

    monthYear.innerText =
        currentDate.toLocaleString("default", { month: "long", year: "numeric" });

    const first = new Date(y, m, 1).getDay();
    const days = new Date(y, m + 1, 0).getDate();
    const today = new Date();

    for (let i = 0; i < first; i++) {
        calendar.appendChild(document.createElement("div"));
    }

    for (let d = 1; d <= days; d++) {

        let div = document.createElement("div");
        div.innerText = d;

        let full =
            `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

        let dayBookings = bookings.filter(b => b.date === full);

        if (dayBookings.length > 0) {
            let statuses = dayBookings.map(b => b.status);

            if (statuses.includes("final_approved"))
                div.classList.add("approved-day");
            else if (statuses.includes("coord_approved"))
                div.classList.add("pending-day");
            else if (statuses.includes("rejected"))
                div.classList.add("rejected-day");
        }

        if (d === today.getDate() &&
            m === today.getMonth() &&
            y === today.getFullYear()) {
            div.classList.add("today");
        }

        calendar.appendChild(div);
    }
}

/* ================= NAV ================= */
function changeMonth(x) {
    currentDate.setMonth(currentDate.getMonth() + x);
    renderCalendar();
}

/* ================= LOGOUT ================= */
function logout() {
    localStorage.clear();
    location.href = "login.html";
}

/* ================= INIT ================= */
loadEvents();
loadApprovalHistory();

</script>

</body>
</html>
