<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
    <h2>EVENTRA</h2>

    <div class="nav-right">
        <span>student@college.edu</span>
        <span class="role-badge">STUDENT</span>
        <span class="logout" onclick="logout()">Logout</span>
    </div>
</div>

<div class="dashboard-layout">

<div class="main-content">

<!-- BOOK EVENT -->
<div class="card">
<h3>Book a Hall</h3>

<input id="event_name" type="text" placeholder="Event Name">
<input id="department" type="text" placeholder="Department">

<select id="hall">
<option value="1">Seminar Hall</option>
<option value="2">Auditorium</option>
</select>

<input id="date" type="date">
<input id="start_time" type="time">
<input id="end_time" type="time">

<button class="btn" onclick="createEvent()">Submit Request</button>

</div>

<!-- MY BOOKINGS -->
<div class="card">
<h3>My Bookings</h3>

<table class="table">
<tr>
<th>EVENT</th>
<th>HALL</th>
<th>DATE</th>
<th>STATUS</th>
</tr>
</table>

</div>

</div>

<!-- CALENDAR -->
<div class="calendar-sidebar">

<div class="calendar-card">

<h3>Upcoming Events</h3>

<div class="calendar-header">
<button onclick="changeMonth(-1)">◀</button>
<span id="monthYear"></span>
<button onclick="changeMonth(1)">▶</button>
</div>

<div class="calendar-grid" id="calendar"></div>

</div>

</div>

</div>
<script>

let currentDate = new Date();
let events = {};

/* AUTH CHECK */
if (!localStorage.getItem("token")) {
    window.location.href = "login.html";
}

function getAuthHeader(){
    return {
        "Content-Type":"application/json",
        "Authorization":"Bearer "+localStorage.getItem("token")
    };
}

/* ================= BOOK EVENT ================= */

function bookEvent(){

    const title = document.getElementById("event_name").value;
    const department = document.getElementById("department").value;
    const hallId = document.getElementById("hall").value;
    const date = document.getElementById("date").value;
    const startTime = document.getElementById("start_time").value;
    const endTime = document.getElementById("end_time").value;

    fetch("http://127.0.0.1:5000/create_event",{
        method:"POST",
        headers:getAuthHeader(),
        body:JSON.stringify({
            title:title,
            description:department,
            hall_id:parseInt(hallId),
            date:date,
            start_time:startTime,
            end_time:endTime
        })
    })
    .then(res=>res.json())
    .then(data=>{
        alert(data.message);
        loadMyBookings();
        loadCalendarEvents();
    });
}

/* ================= LOAD BOOKINGS ================= */

function loadMyBookings(){

fetch("http://127.0.0.1:5000/get_events",{
headers:getAuthHeader()
})
.then(res=>res.json())
.then(data=>{

let table=document.querySelector(".table");

table.innerHTML=`
<tr>
<th>EVENT</th>
<th>HALL</th>
<th>DATE</th>
<th>STATUS</th>
</tr>
`;

data.forEach(e=>{

let hallName = e.hall_id==1 ? "Seminar Hall" : "Auditorium";

table.innerHTML+=`
<tr>
<td>${e.title}</td>
<td>${hallName}</td>
<td>${e.date}</td>
<td>
<span class="status ${e.status}">
${e.status.toUpperCase()}
</span>
</td>
</tr>
`;

});

});

}

/* ================= CALENDAR ================= */

function loadCalendarEvents(){

fetch("http://127.0.0.1:5000/get_events",{
headers:getAuthHeader()
})
.then(res=>res.json())
.then(data=>{

events={};

data.forEach(e=>{
events[e.date]=e.status;
});

renderCalendar();

});

}

function renderCalendar(){

const calendar=document.getElementById("calendar");
const monthYear=document.getElementById("monthYear");

calendar.innerHTML="";

const month=currentDate.getMonth();
const year=currentDate.getFullYear();

const months=[
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

monthYear.innerText=months[month]+" "+year;

const firstDay=new Date(year,month,1).getDay();
const daysInMonth=new Date(year,month+1,0).getDate();

const today=new Date();

const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

dayNames.forEach(d=>{
let div=document.createElement("div");
div.innerText=d;
div.style.fontWeight="600";
calendar.appendChild(div);
});

for(let i=0;i<firstDay;i++){
calendar.appendChild(document.createElement("div"));
}

for(let day=1; day<=daysInMonth; day++){

let div=document.createElement("div");
div.innerText=day;

let fullDate=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

if(events[fullDate]){
div.classList.add(events[fullDate]+"-day");
}

if(day===today.getDate() &&
month===today.getMonth() &&
year===today.getFullYear()){
div.classList.add("today");
}

calendar.appendChild(div);
}

}

function changeMonth(dir){
currentDate.setMonth(currentDate.getMonth()+dir);
renderCalendar();
loadCalendarEvents();
}

function logout(){
localStorage.removeItem("token");
window.location.href="login.html";
}

loadMyBookings();
loadCalendarEvents();

</script>

</body>
</html>
