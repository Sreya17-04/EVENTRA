<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
<h2>EVENTRA</h2>
<div class="nav-right">
<span>student@college.edu</span>
<span class="role-badge">STUDENT</span>
<span class="logout" onclick="logout()">Logout</span>
</div>
</div>

<div class="dashboard-layout">

<div class="main-content">

<div class="card">
<h3>Book a Hall</h3>

<input id="event_name" placeholder="Event Name">
<input id="department" placeholder="Department">

<select id="hall"></select>

<input id="date" type="date">
<input id="start_time" type="time">
<input id="end_time" type="time">

<button class="btn" onclick="bookEvent()">Submit</button>
</div>

<div class="card">
<h3>My Bookings</h3>
<table class="table"></table>
</div>

</div>

<div class="calendar-sidebar">
<div class="calendar-card">
<h3>Upcoming Events</h3>
<div class="calendar-header">
<button onclick="changeMonth(-1)">◀</button>
<span id="monthYear"></span>
<button onclick="changeMonth(1)">▶</button>
</div>
<div class="calendar-grid" id="calendar"></div>
</div>
</div>

</div>

<script>

let currentDate = new Date();
let halls = [];

const BASE_URL = "http://127.0.0.1:5000";

/* AUTH */
if(!localStorage.getItem("token")) location.href="login.html";

function getAuthHeader(){
return {
"Content-Type":"application/json",
"Authorization":"Bearer "+localStorage.getItem("token")
};
}

function handle(res){
if(res.status===401){
alert("Session expired");
localStorage.clear();
location.href="login.html";
return null;
}
return res.json();
}

/* LOAD HALLS */
function loadHalls(){
fetch(`${BASE_URL}/get_halls`)
.then(handle)
.then(data=>{
halls=data||[];
console.log("Halls loaded:",halls);
});
}
function loadHalls(){
return fetch(`${BASE_URL}/get_halls`)
.then(handle)
.then(data=>{
halls=data||[];

let select=document.getElementById("hall");
select.innerHTML="<option value=''>Select Hall</option>";

halls.forEach(h=>{
select.innerHTML+=`<option value="${h.id}">${h.name}</option>`;
});
});
}

/* BOOK EVENT */
function bookEvent(){

let title = event_name.value.trim();
let dept = department.value.trim();
let hallId = hall.value;
let dateVal = date.value;
let start = start_time.value;
let end = end_time.value;

if(!title || !dept || !hallId || !dateVal || !start || !end){
alert("Fill all fields");
return;
}

fetch(`${BASE_URL}/create_event`,{
method:"POST",
headers:getAuthHeader(),
body:JSON.stringify({
title:title,
description:dept,
hall_id:Number(hallId),
date:dateVal,
start_time:start,
end_time:end
})
})
.then(handle)
.then(()=>{
loadMyBookings();
loadCalendar();
})
.catch(err=>console.error("Booking Error:",err));
}

/* BOOKINGS */
function loadMyBookings(){
fetch(`${BASE_URL}/get_events`,{headers:getAuthHeader()})
.then(handle)
.then(data=>{

console.log("Bookings:",data);

let table=document.querySelector(".table");

table.innerHTML=`
<tr>
<th>EVENT</th>
<th>HALL</th>
<th>DATE</th>
<th>STATUS</th>
</tr>`;

(data || []).forEach(e => {

let hallName = e.hall?.name || "Unknown";

table.innerHTML += `
<tr>
<td>${e.title}</td>
<td>${hallName}</td>
<td>${e.date}</td>
<td>${e.status}</td>
</tr>`;
});
});
}

/* CALENDAR */
function loadCalendar(){
fetch(`${BASE_URL}/get_events`,{headers:getAuthHeader()})
.then(handle)
.then(data=>{

console.log("Calendar Data:",data);

events={};

(data||[]).forEach(e=>{
if(!events[e.date]) events[e.date]=[];
events[e.date].push(e.status);
});

renderCalendar();
});
}

function renderCalendar(){

let cal=document.getElementById("calendar");
cal.innerHTML="";

let m=currentDate.getMonth();
let y=currentDate.getFullYear();

monthYear.innerText=currentDate.toLocaleString("default",{month:"long",year:"numeric"});

let first=new Date(y,m,1).getDay();
let days=new Date(y,m+1,0).getDate();

for(let i=0;i<first;i++){
cal.appendChild(document.createElement("div"));
}

for(let d=1;d<=days;d++){

let div=document.createElement("div");
div.innerText=d;

let full=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

if(events[full]){
if(events[full].includes("rejected")) div.classList.add("rejected-day");
else if(events[full].includes("final_approved")) div.classList.add("approved-day");
else div.classList.add("pending-day");
}

cal.appendChild(div);
}
}

function changeMonth(x){
currentDate.setMonth(currentDate.getMonth()+x);
loadCalendar();
}

function logout(){
localStorage.clear();
location.href="login.html";
}

/* INIT — FIXED ORDER */
loadHalls().then(()=>{
loadMyBookings();
loadCalendar();
});

</script>
</body>
</html>
